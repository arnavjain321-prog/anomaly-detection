AWSTemplateFormatVersion: "2010-09-09"
Description: DS5220 Anomaly Detection Pipeline Core Infrastructure

Parameters:
  KeyName:
    Description: EC2 Key Pair
    Type: AWS::EC2::KeyPair::KeyName
    Default: ds5220-keypair

  MyIP:
    Description: Your IP for SSH access
    Type: String
    Default: 0.0.0.0/0

Resources:
  DataBucket:
    Type: AWS::S3::Bucket

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

  EC2Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BucketAccess
      Roles:
        - !Ref EC2Role
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${DataBucket}
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub arn:aws:s3:::${DataBucket}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and FastAPI
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      ImageId: ami-053b0d53c279acc90
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          apt-get update -y
          apt-get install -y python3 python3-pip python3-venv git

          cd /home/ubuntu
          git clone https://github.com/arnavjain321-prog/anomaly-detection.git
          cd anomaly-detection

          python3 -m venv venv
          /home/ubuntu/anomaly-detection/venv/bin/pip install --upgrade pip
          /home/ubuntu/anomaly-detection/venv/bin/pip install -r requirements.txt
          /home/ubuntu/anomaly-detection/venv/bin/pip install fastapi uvicorn boto3 pandas scikit-learn requests

          echo "BUCKET_NAME=${DataBucket}" >> /etc/environment
          export BUCKET_NAME=${DataBucket}

          cat > /etc/systemd/system/anomaly-api.service <<EOF
          [Unit]
          Description=Anomaly Detection FastAPI Service
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/anomaly-detection
          Environment=BUCKET_NAME=${DataBucket}
          ExecStart=/home/ubuntu/anomaly-detection/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable anomaly-api.service
          systemctl start anomaly-api.service

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      AllocationId: !GetAtt ElasticIP.AllocationId

  SNSSubscription:
    Type: AWS::SNS::Subscription
    DependsOn:
      - EIPAssociation
      - EC2Instance
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: http
      Endpoint: !Sub "http://${ElasticIP}:8000/notify"

Outputs:
  BucketName:
    Description: S3 bucket used by the anomaly pipeline
    Value: !Ref DataBucket

  ElasticIPAddress:
    Description: Public Elastic IP of the EC2 instance
    Value: !Ref ElasticIP

  InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance

  TopicArn:
    Description: SNS topic ARN
    Value: !Ref SNSTopic