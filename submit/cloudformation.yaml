AWSTemplateFormatVersion: "2010-09-09"
Description: DS5220 Data Project 1 – Event-driven anomaly detection pipeline

Parameters:

KeyName:
Description: EC2 Key Pair
Type: AWS::EC2::KeyPair::KeyName
Default: ds5220-keypair

MyIP:
Description: Your IP for SSH
Type: String
Default: 0.0.0.0/0

Resources:

# ----------------------------

# S3 Bucket

# ----------------------------

DataBucket:
Type: AWS::S3::Bucket

# ----------------------------

# IAM Role for EC2

# ----------------------------

EC2Role:
Type: AWS::IAM::Role
Properties:
AssumeRolePolicyDocument:
Version: "2012-10-17"
Statement:
- Effect: Allow
Principal:
Service: ec2.amazonaws.com
Action: sts:AssumeRole

EC2Policy:
Type: AWS::IAM::Policy
Properties:
PolicyName: BucketAccess
Roles:
- !Ref EC2Role
PolicyDocument:
Version: "2012-10-17"
Statement:
- Effect: Allow
Action:
- s3:*
Resource:
- !Sub arn:aws:s3:::${DataBucket}
- !Sub arn:aws:s3:::${DataBucket}/*

EC2InstanceProfile:
Type: AWS::IAM::InstanceProfile
Properties:
Roles:
- !Ref EC2Role

# ----------------------------

# Security Group

# ----------------------------

InstanceSecurityGroup:
Type: AWS::EC2::SecurityGroup
Properties:
GroupDescription: Allow SSH and FastAPI
SecurityGroupIngress:
- IpProtocol: tcp
FromPort: 22
ToPort: 22
CidrIp: !Ref MyIP

```
    - IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      CidrIp: 0.0.0.0/0
```

# ----------------------------

# EC2 Instance

# ----------------------------

EC2Instance:
Type: AWS::EC2::Instance
Properties:

```
  InstanceType: t3.micro
  KeyName: !Ref KeyName

  ImageId: ami-053b0d53c279acc90   # Ubuntu 24.04 (us-east-1)

  SecurityGroupIds:
    - !Ref InstanceSecurityGroup

  IamInstanceProfile: !Ref EC2InstanceProfile

  BlockDeviceMappings:
    - DeviceName: /dev/sda1
      Ebs:
        VolumeSize: 16

  UserData:
    Fn::Base64: !Sub |
      #!/bin/bash
      apt-get update -y
      apt-get install -y python3 python3-pip python3-venv git

      cd /home/ubuntu

      git clone https://github.com/uvasds-systems/anomaly-detection.git

      cd anomaly-detection

      python3 -m venv venv
      source venv/bin/activate

      pip install -r requirements.txt
      pip install fastapi uvicorn boto3 pandas scikit-learn

      echo "BUCKET_NAME=${DataBucket}" >> /etc/environment
      export BUCKET_NAME=${DataBucket}

      nohup venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000 &
```

# ----------------------------

# Elastic IP

# ----------------------------

ElasticIP:
Type: AWS::EC2::EIP

EIPAssociation:
Type: AWS::EC2::EIPAssociation
Properties:
InstanceId: !Ref EC2Instance
AllocationId: !GetAtt ElasticIP.AllocationId

# ----------------------------

# SNS Topic

# ----------------------------

SNSTopic:
Type: AWS::SNS::Topic
Properties:
TopicName: ds5220-dp1

# ----------------------------

# SNS Subscription

# ----------------------------

SNSSubscription:
Type: AWS::SNS::Subscription
Properties:
TopicArn: !Ref SNSTopic
Protocol: http
Endpoint: !Sub http://${ElasticIP}:8000/notify

# ----------------------------

# Bucket Notification

# ----------------------------

BucketNotification:
Type: AWS::S3::BucketNotification
Properties:
Bucket: !Ref DataBucket
NotificationConfiguration:
TopicConfigurations:
- Event: s3:ObjectCreated:*
Topic: !Ref SNSTopic
Filter:
S3Key:
Rules:
- Name: prefix
Value: raw/
- Name: suffix
Value: .csv
